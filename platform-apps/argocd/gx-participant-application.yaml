apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gx-participant
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Data-Space-Core/GX-Participant.git
    targetRevision: main
    path: platform-apps/gx-participant
  destination:
    server: https://kubernetes.default.svc
    namespace: gx-participant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
