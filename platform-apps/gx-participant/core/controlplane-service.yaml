apiVersion: v1
kind: Service
metadata:
  name: gx-participant-controlplane
  namespace: gx-participant
spec:
  selector:
    app.kubernetes.io/name: gx-participant-controlplane
  ports:
    - name: web
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
    - name: protocol
      port: 8082
      targetPort: 8082
    - name: control
      port: 8083
      targetPort: 8083
    - name: catalog
      port: 8084
      targetPort: 8084
