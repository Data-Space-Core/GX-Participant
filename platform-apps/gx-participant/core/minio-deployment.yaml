apiVersion: apps/v1
kind: Deployment
metadata:
  name: gx-participant-minio
  namespace: gx-participant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gx-participant-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gx-participant-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2026-01-28T22-12-05Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gx-participant-minio
