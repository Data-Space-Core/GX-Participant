apiVersion: apps/v1
kind: Deployment
metadata:
  name: gx-participant-did
  namespace: gx-participant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gx-participant-did
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gx-participant-did
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: did-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: did-config
              mountPath: /var/www/did.json
              subPath: did.json
              readOnly: true
      volumes:
        - name: did-config
          configMap:
            name: participant-did-config
