apiVersion: apps/v1
kind: Deployment
metadata:
  name: gx-participant-identityhub
  namespace: gx-participant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gx-participant-identityhub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gx-participant-identityhub
    spec:
      containers:
        - name: identity-hub
          image: ghcr.io/REPLACE_ME/identity-hub:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EDC_IH_IAM_ID
              valueFrom:
                configMapKeyRef:
                  name: participant-settings
                  key: PARTICIPANT_DID
            - name: EDC_IAM_DID_WEB_USE_HTTPS
              value: "true"
            - name: EDC_IH_IAM_PUBLICKEY_ALIAS
              valueFrom:
                secretKeyRef:
                  name: participant-bootstrap
                  key: participant-public-key-alias.txt
            - name: EDC_IH_API_SUPERUSER_KEY
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: EDC_IH_API_SUPERUSER_KEY
            - name: WEB_HTTP_PORT
              value: "7080"
            - name: WEB_HTTP_PATH
              value: /api
            - name: WEB_HTTP_CREDENTIALS_PORT
              value: "7081"
            - name: WEB_HTTP_CREDENTIALS_PATH
              value: /api/credentials
            - name: WEB_HTTP_IDENTITY_PORT
              value: "7082"
            - name: WEB_HTTP_IDENTITY_PATH
              value: /api/identity
            - name: WEB_HTTP_DID_PORT
              value: "7083"
            - name: WEB_HTTP_DID_PATH
              value: /
            - name: WEB_HTTP_STS_PORT
              value: "7086"
            - name: WEB_HTTP_STS_PATH
              value: /api/sts
            - name: EDC_IAM_STS_PRIVATEKEY_ALIAS
              value: key-1
            - name: EDC_IAM_STS_PUBLICKEY_ID
              valueFrom:
                configMapKeyRef:
                  name: participant-settings
                  key: PARTICIPANT_DID_KEY_ID
            - name: EDC_MVD_CREDENTIALS_PATH
              value: /etc/credentials/
            - name: EDC_VAULT_HASHICORP_URL
              value: http://gx-participant-vault:8200
            - name: EDC_VAULT_HASHICORP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: EDC_VAULT_HASHICORP_TOKEN
            - name: EDC_DATASOURCE_DEFAULT_URL
              value: jdbc:postgresql://gx-participant-postgres:5432/participant
            - name: EDC_DATASOURCE_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: POSTGRES_USER
            - name: EDC_DATASOURCE_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: POSTGRES_PASSWORD
            - name: EDC_SQL_SCHEMA_AUTOCREATE
              value: "true"
            - name: EDC_IAM_ACCESSTOKEN_JTI_VALIDATION
              value: "true"
          ports:
            - containerPort: 7080
              name: web
            - containerPort: 7081
              name: credentials
            - containerPort: 7082
              name: identity
            - containerPort: 7083
              name: did
            - containerPort: 7086
              name: sts
          readinessProbe:
            httpGet:
              path: /api/check/readiness
              port: 7080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/check/liveness
              port: 7080
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /api/check/startup
              port: 7080
            failureThreshold: 20
            periodSeconds: 5
