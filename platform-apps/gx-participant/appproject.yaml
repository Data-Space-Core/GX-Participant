apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gx-participant
  namespace: argocd
spec:
  description: Participant EDC stack for tenant clusters
  sourceRepos:
    - https://github.com/Data-Space-Core/GX-Participant.git
  destinations:
    - namespace: gx-participant
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
