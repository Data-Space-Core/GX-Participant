apiVersion: batch/v1
kind: Job
metadata:
  name: gx-participant-minio-bootstrap
  namespace: gx-participant
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2026-01-17T23-25-50Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until /usr/bin/mc alias set local http://gx-participant-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio"
                sleep 2
              done
              /usr/bin/mc mb --ignore-existing local/participant-data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_PASSWORD
