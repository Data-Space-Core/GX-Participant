apiVersion: apps/v1
kind: Deployment
metadata:
  name: gx-participant-minio
  namespace: gx-participant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gx-participant-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gx-participant-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gx-participant-stack
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BROWSER_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_BROWSER_REDIRECT_URL
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_CLIENT_ID
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_CLIENT_SECRET
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_CONFIG_URL
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_DISPLAY_NAME
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC
            - name: MINIO_IDENTITY_OPENID_SCOPES
              valueFrom:
                secretKeyRef:
                  name: gx-participant-minio-oidc
                  key: MINIO_IDENTITY_OPENID_SCOPES
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gx-participant-minio
